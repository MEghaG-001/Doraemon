<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Hover</title>
    <link rel = "stylesheet" href = "card.css">
</head>
<body>
    <div id = "blue" class = "card">
        <img src = "Doraemon.jpg" alt="Doraemon" />
        <div class = "desc">
            <h3>Doraemon</h3>
            <p>A robotic cat who helps Nobita</p>
        </div>
    </div>
    <div  id = "yellow" class = "card">
        <img src="../Image/Nobita.jpg" alt ="Nobita">
        <div class = "desc">
            <h3>Nobita Nobi</h3>
            <p>Kind-heared but lazy and unlucky</p>
        </div>
    </div>
    <div  id = "pink" class = "card">
        <img src="../Image/Shizuka.jpg"  alt ="Shizuka" >
        <div class = "desc">
            <h3>Shizuka Minamoto</h3>
            <p>Smart, caring, and Nobita's best friend</p>
        </div>
    </div>
    <div  id = "green" class = "card">
        <img src="../Image/Suneo.jpg" alt = "Suneo" >
        <div class = "desc">
            <h3>Suneo Honekawa</h3>
            <p>Rich, clever, and likes showing off</p>
        </div>
    </div>
    <div  id = "orange" class = "card">
        <img src = "../Image/Gian.jpg" alt ="Gain">
        <div class = "desc">
            <h3>Gian Goda</h3>
            <p>Strong bully with a good heart</p>
        </div>
    </div>
</body>
</html>
